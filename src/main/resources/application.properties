spring.application.name=expense-tracker

# ===== MySQL Database Config =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate Config =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Server Config =====
server.port=${PORT:8080}

# ===== JWT Config =====
jwt.secret=${JWT_SECRET:ExpenseTrackerSecretKeyForJWTSigningMustBeAtLeast256BitsLong123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}