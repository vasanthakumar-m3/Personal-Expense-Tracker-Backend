spring.application.name=expense-tracker

# ===== MySQL Database Config =====
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=kumar@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate Config =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Server Config =====
server.port=8080

# ===== JWT Config =====
jwt.secret=ExpenseTrackerSecretKeyForJWTSigningMustBeAtLeast256BitsLong123456
jwt.expiration=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000
